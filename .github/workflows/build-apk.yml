name: Build Vibely APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

    - name: Download app icon and create resources
      run: |
        mkdir -p resources
        curl -L -o resources/icon.png "https://files.catbox.moe/d81vkj.png"
        cp resources/icon.png resources/icon-foreground.png
        cp resources/icon.png resources/splash.png
        cp resources/icon.png resources/splash-dark.png

    - name: Install dependencies
      run: npm ci --legacy-peer-deps || npm install

    - name: Install Capacitor Assets
      run: npm install @capacitor/assets --save-dev

    - name: Build web app
      run: npm run build

    - name: Remove old config and Init Capacitor
      run: |
        rm -f capacitor.config.ts capacitor.config.json
        npx cap init "Vibely" com.megan.vibely --web-dir=dist
        npx cap add android

    - name: Generate App Icons and Splash
      run: |
        npx capacitor-assets generate --android --iconBackgroundColor '#06060e' --splashBackgroundColor '#06060e' 2>/dev/null || echo "Icons generated"
        npx cap sync android

    - name: Write capacitor.config.json
      run: |
        cat > capacitor.config.json << 'CAPEOF'
        {
          "appId": "com.megan.vibely",
          "appName": "Vibely",
          "webDir": "dist",
          "server": {
            "androidScheme": "https",
            "cleartext": true,
            "hostname": "music.megan.qzz.io",
            "allowNavigation": [
              "music.megan.qzz.io",
              "apis.megan.qzz.io",
              "*.youtube.com",
              "*.ytimg.com",
              "*.megan.qzz.io"
            ]
          },
          "plugins": {
            "SplashScreen": {
              "launchShowDuration": 2000,
              "launchAutoHide": true,
              "backgroundColor": "#06060e",
              "androidScaleType": "CENTER_CROP",
              "showSpinner": true,
              "spinnerColor": "#7c3aed"
            },
            "StatusBar": {
              "style": "dark",
              "backgroundColor": "#06060e"
            }
          }
        }
        CAPEOF

    - name: Add Android Permissions
      run: |
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<manifest/a \    <uses-permission android:name="android.permission.WAKE_LOCK" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<application/a \        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml

    - name: Upgrade Gradle to 8.5
      run: |
        cd android
        sed -i 's/gradle-.*-all.zip/gradle-8.5-all.zip/g' gradle/wrapper/gradle-wrapper.properties

    - name: Configure Gradle
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties

    - name: Fix Kotlin conflicts
      run: |
        cat >> android/app/build.gradle << 'GRADLEEOF'

        configurations.all {
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
        }
        GRADLEEOF

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vibely-v${{ github.run_number }}
        path: android/app/build/outputs/apk/debug/app-debug.apk
